<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenStage API Test</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #101217;
        color: #f5f7fb;
      }

      main {
        box-sizing: border-box;
        width: min(900px, 100%);
        margin: 0 auto;
        padding: 32px 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
      }

      textarea,
      pre {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #3b4253;
        border-radius: 8px;
        background: #171b24;
        color: #f5f7fb;
        font: 16px/1.45 Consolas, "Courier New", monospace;
      }

      textarea {
        min-height: 120px;
        padding: 12px;
        resize: vertical;
      }

      button {
        margin: 16px 0;
        border: 0;
        border-radius: 8px;
        background: #0f766e;
        color: white;
        cursor: pointer;
        font-size: 16px;
        font-weight: 700;
        padding: 12px 16px;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      pre {
        min-height: 260px;
        overflow: auto;
        padding: 14px;
        white-space: pre-wrap;
      }

      .hint {
        color: #aab4c5;
        font-size: 14px;
        margin-bottom: 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>OpenStage API Test</h1>
      <p class="hint">Temporary test page. This is not part of the OpenStage app navigation.</p>

      <label for="prompt">Prompt</label>
      <textarea id="prompt">Say hello from OpenStage</textarea>

      <button id="send" type="button">Send to Anthropic</button>

      <label for="response">Response</label>
      <pre id="response">Waiting...</pre>
    </main>

    <script>
      const apiUrl = 'https://openstage-api.onrender.com/api/test-anthropic';
      const promptBox = document.getElementById('prompt');
      const sendButton = document.getElementById('send');
      const responseBox = document.getElementById('response');

      sendButton.addEventListener('click', async () => {
        sendButton.disabled = true;
        responseBox.textContent = 'Sending...';

        try {
          const response = await fetch(apiUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              prompt: promptBox.value
            })
          });
          const text = await response.text();
          let body;

          try {
            body = JSON.parse(text);
          } catch {
            body = text;
          }

          const result = {
            status: response.status,
            statusText: response.statusText,
            ok: response.ok,
            body
          };

          if (!response.ok) {
            result.error = typeof body === 'object' && body && 'error' in body
              ? body.error
              : 'Backend returned an error response.';
          }

          responseBox.textContent = JSON.stringify(result, null, 2);
        } catch (error) {
          responseBox.textContent = JSON.stringify({
            ok: false,
            status: null,
            error: error instanceof Error ? error.message : String(error)
          }, null, 2);
        } finally {
          sendButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
