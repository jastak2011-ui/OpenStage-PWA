<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenStage Cast Receiver</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #ffffff;
        color: #000000;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        box-sizing: border-box;
        display: flex;
        min-height: 100vh;
        width: 100vw;
        align-items: center;
        justify-content: center;
        padding: 48px;
        text-align: center;
      }

      section {
        display: grid;
        gap: 42px;
        max-width: 1100px;
      }

      h1 {
        margin: 0;
        font-size: clamp(48px, 7vw, 96px);
        line-height: 1.05;
      }

      .status {
        margin: 18px 0 0;
        font-size: clamp(32px, 4vw, 56px);
        font-weight: 700;
      }

      .label {
        margin: 0 0 12px;
        font-size: clamp(24px, 3vw, 40px);
        font-weight: 700;
        text-transform: uppercase;
      }

      .value {
        margin: 0;
        font-size: clamp(42px, 6vw, 82px);
        font-weight: 800;
      }

      .diagnostic {
        position: fixed;
        right: 0;
        bottom: 28px;
        left: 0;
        font-size: clamp(18px, 2vw, 28px);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <section aria-label="OpenStage Cast Receiver status">
        <div>
          <h1>OpenStage Cast Receiver</h1>
          <p class="status">Receiver Online</p>
        </div>
        <div>
          <p class="label">Current Song:</p>
          <p class="value" id="song-title">Take It Easy</p>
        </div>
        <div>
          <p class="label">Artist:</p>
          <p class="value" id="song-artist">Eagles</p>
        </div>
      </section>
    </main>
    <p class="diagnostic">Receiver page loaded successfully</p>
    <script>
      const params = new URLSearchParams(window.location.search);
      const rawTitle = params.get('title');
      const rawArtist = params.get('artist');
      const title = rawTitle && rawTitle.trim() ? rawTitle.trim() : 'Take It Easy';
      const artist = rawArtist && rawArtist.trim() ? rawArtist.trim() : 'Eagles';
      document.getElementById('song-title').textContent = title;
      document.getElementById('song-artist').textContent = artist;
    </script>
  </body>
</html>
