<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenStage Cast Receiver</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #ffffff;
        color: #000000;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        box-sizing: border-box;
        display: flex;
        min-height: 100vh;
        width: 100vw;
        align-items: center;
        justify-content: center;
        padding: 48px;
        text-align: center;
      }

      section {
        display: grid;
        gap: 42px;
        max-width: 1100px;
      }

      h1 {
        margin: 0;
        font-size: clamp(48px, 7vw, 96px);
        line-height: 1.05;
      }

      .status {
        margin: 18px 0 0;
        font-size: clamp(32px, 4vw, 56px);
        font-weight: 700;
      }

      .label {
        margin: 0 0 12px;
        font-size: clamp(24px, 3vw, 40px);
        font-weight: 700;
        text-transform: uppercase;
      }

      .value {
        margin: 0;
        font-size: clamp(42px, 6vw, 82px);
        font-weight: 800;
      }

      .chart {
        margin: 0;
        white-space: pre-wrap;
        text-align: left;
        font-size: clamp(30px, 4vw, 58px);
        font-weight: 700;
        line-height: 1.35;
      }

      .diagnostic {
        position: fixed;
        right: 0;
        bottom: 28px;
        left: 0;
        font-size: clamp(18px, 2vw, 28px);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <section aria-label="OpenStage Cast Receiver status">
        <div>
          <h1>OpenStage Cast Receiver</h1>
          <p class="status">Receiver Online</p>
        </div>
        <div>
          <p class="label">Current Song:</p>
          <p class="value" id="song-title">Take It Easy</p>
        </div>
        <div>
          <p class="label">Artist:</p>
          <p class="value" id="song-artist">Eagles</p>
        </div>
        <pre class="chart" id="song-chart">Well I'm running down the road
Tryin' to loosen my load</pre>
      </section>
    </main>
    <div class="diagnostic">
      <p id="demo-mode"></p>
      <p id="chart-lines">Chart lines: 2</p>
      <p>Receiver page loaded successfully</p>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const rawDemo = params.get('demo');
      const demo = rawDemo && rawDemo.trim() ? rawDemo.trim().toLowerCase() : '';
      const demoSongs = {
        '3am': {
          title: '3AM',
          artist: 'Matchbox 20',
          chart: 'Line1\nLine2',
        },
        takeiteasy: {
          title: 'Take It Easy',
          artist: 'Eagles',
          chart: "Well I'm running down the road\nTrying to loosen my load",
        },
      };
      const demoSong = demoSongs[demo];
      const rawTitle = params.get('title');
      const rawArtist = params.get('artist');
      const rawChart = params.get('chart');
      const title = demoSong ? demoSong.title : rawTitle && rawTitle.trim() ? rawTitle.trim() : 'Take It Easy';
      const artist = demoSong ? demoSong.artist : rawArtist && rawArtist.trim() ? rawArtist.trim() : 'Eagles';
      const chart = demoSong ? demoSong.chart : rawChart && rawChart.trim() ? rawChart.trim() : "Well I'm running down the road\nTryin' to loosen my load";
      const chartLineCount = chart.split(/\r\n|\r|\n/).length;
      document.getElementById('song-title').textContent = title;
      document.getElementById('song-artist').textContent = artist;
      document.getElementById('song-chart').textContent = chart;
      document.getElementById('demo-mode').textContent = demoSong ? 'Demo mode: ' + demo : '';
      document.getElementById('chart-lines').textContent = 'Chart lines: ' + chartLineCount;
    </script>
  </body>
</html>
