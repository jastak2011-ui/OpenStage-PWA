<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>OpenStage Receiver Debug</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #080808;
        color: #ffffff;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        box-sizing: border-box;
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px;
        text-align: center;
      }

      section {
        display: grid;
        gap: 22px;
        max-width: 900px;
      }

      h1 {
        margin: 0;
        font-size: clamp(42px, 8vw, 92px);
        line-height: 1.05;
      }

      p {
        margin: 0;
        font-size: clamp(24px, 4vw, 46px);
        font-weight: 700;
      }

      .build {
        color: #ffdf7e;
        font-family: Consolas, "Courier New", monospace;
        font-size: clamp(18px, 2.5vw, 30px);
        overflow-wrap: anywhere;
      }

      .badge {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 999999;
        background: #dc0000;
        color: #ffffff;
        font-family: Consolas, "Courier New", monospace;
        font-size: 18px;
        font-weight: 800;
        line-height: 1.15;
        padding: 8px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <div class="badge">RECEIVER DEBUG ACTIVE - /receiver-debug.html - StaticDebug - 2026-07-03T10:52:59.9491159-04:00</div>
    <main>
      <section>
        <h1>OpenStage Receiver Debug</h1>
        <p>Build time:</p>
        <p class="build">2026-07-03T10:52:59.9491159-04:00</p>
        <p>If you can see this, FireTV loaded the latest static files.</p>
      </section>
    </main>
  </body>
</html>
