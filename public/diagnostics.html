<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenStage Diagnostics</title>
    <style>
      body {
        margin: 0;
        background: #0b1020;
        color: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        max-width: 820px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      p {
        color: #cbd5e1;
      }
      dl {
        display: grid;
        grid-template-columns: minmax(150px, 220px) 1fr;
        gap: 8px 14px;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 14px;
        background: #111827;
      }
      dt {
        color: #fcd34d;
        font-weight: 700;
      }
      dd {
        margin: 0;
        overflow-wrap: anywhere;
      }
      pre {
        white-space: pre-wrap;
        border: 1px solid #334155;
        border-radius: 8px;
        background: #111827;
        padding: 12px;
        color: #d1fae5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>OpenStage Diagnostics</h1>
      <p>This page does not use React. If you can read this on iPad Safari, the Vite server and basic HTML/JavaScript are working.</p>
      <dl id="diagnostics">
        <dt>Status</dt>
        <dd>Collecting diagnostics...</dd>
      </dl>
      <h2>Startup Log</h2>
      <pre id="log">diagnostics html loaded</pre>
    </main>
    <script>
      (function () {
        var log = ['diagnostics html loaded'];
        var diagnosticsEl = document.getElementById('diagnostics');
        var logEl = document.getElementById('log');

        function safe(label, test) {
          try {
            return test() ? 'yes' : 'no';
          } catch (error) {
            return 'error: ' + (error && error.message ? error.message : String(error));
          }
        }

        function storageTest() {
          var key = 'openstage-diagnostics-probe';
          localStorage.setItem(key, '1');
          localStorage.removeItem(key);
          return true;
        }

        function row(label, value) {
          return '<dt>' + escapeHtml(label) + '</dt><dd>' + escapeHtml(value) + '</dd>';
        }

        function escapeHtml(value) {
          return String(value).replace(/[&<>"']/g, function (char) {
            return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
          });
        }

        window.onerror = function (message, source, lineno, colno, error) {
          log.push('window.onerror: ' + message + ' at ' + source + ':' + lineno + ':' + colno);
          if (error && error.stack) log.push(error.stack);
          logEl.textContent = log.join('\n');
        };

        window.onunhandledrejection = function (event) {
          log.push('window.onunhandledrejection: ' + (event && event.reason ? event.reason : event));
          logEl.textContent = log.join('\n');
        };

        var html = '';
        html += row('Page loaded', 'yes');
        html += row('Current URL', location.href);
        html += row('User agent', navigator.userAgent);
        html += row('Platform', navigator.platform || '-');
        html += row('Module scripts', safe('module', function () { return 'noModule' in document.createElement('script'); }));
        html += row('IndexedDB', safe('indexedDB', function () { return typeof indexedDB !== 'undefined'; }));
        html += row('localStorage', safe('localStorage', storageTest));
        html += row('Service worker', safe('serviceWorker', function () { return 'serviceWorker' in navigator; }));
        html += row('Fullscreen', safe('fullscreen', function () { return !!(document.documentElement.requestFullscreen || document.exitFullscreen); }));
        html += row('Folder drag/drop', safe('webkitGetAsEntry', function () { return 'DataTransferItem' in window && 'webkitGetAsEntry' in DataTransferItem.prototype; }));
        html += row('Wake lock', safe('wakeLock', function () { return 'wakeLock' in navigator; }));
        html += row('File system access', safe('showOpenFilePicker', function () { return 'showOpenFilePicker' in window; }));
        html += row('Touch support', safe('touch', function () { return 'ontouchstart' in window || navigator.maxTouchPoints > 0; }));
        diagnosticsEl.innerHTML = html;
        log.push('diagnostics rendered');
        logEl.textContent = log.join('\n');
      })();
    </script>
  </body>
</html>
